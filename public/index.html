<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tee Times</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #fff;
    color: #111;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  #filter-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #fff;
    border-bottom: 1px solid #ccc;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-group label {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
  }

  #date-input, #from-time, #to-time, #distance {
    font-family: inherit;
    font-size: 14px;
    padding: 4px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    outline: none;
  }

  #date-input:focus, #from-time:focus, #to-time:focus, #distance:focus {
    border-color: #555;
  }

  .toggle-group {
    display: flex;
    gap: 4px;
  }

  .toggle-btn {
    font-family: inherit;
    font-size: 13px;
    padding: 4px 10px;
    border: 1px solid #999;
    border-radius: 4px;
    background: #fff;
    color: #111;
    cursor: pointer;
    line-height: 1.4;
  }

  .toggle-btn.active {
    background: #222;
    color: #fff;
    border-color: #222;
  }

  .toggle-btn:hover:not(.active) {
    background: #f0f0f0;
  }

  #status {
    font-size: 13px;
    color: #888;
    margin-left: auto;
  }

  #table-container {
    flex: 1;
    overflow: auto;
  }

  #message {
    display: none;
    justify-content: center;
    align-items: center;
    height: 100%;
    font-size: 15px;
  }

  #message.error {
    color: #c00;
  }

  table {
    border-collapse: collapse;
    min-width: 100%;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 5;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 0;
  }

  .th-course {
    font-size: 13px;
    font-weight: bold;
    color: #fff;
    text-align: center;
    padding: 6px 10px;
    white-space: nowrap;
  }

  .th-sub {
    font-size: 12px;
    color: #fff;
    text-align: center;
    padding: 5px 8px;
    white-space: nowrap;
  }

  .th-time {
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    padding: 6px 8px;
    width: 65px;
    min-width: 65px;
  }

  .td-time {
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    background: #fff;
    width: 65px;
    min-width: 65px;
    position: sticky;
    left: 0;
    z-index: 2;
    padding: 6px 4px;
    white-space: nowrap;
  }

  .td-slot {
    text-align: center;
    padding: 4px 8px;
    min-width: 80px;
    cursor: pointer;
    vertical-align: middle;
  }

  .td-slot:hover {
    filter: brightness(1.15);
  }

  .td-empty {
    background: #eee;
    min-width: 80px;
  }

  .slot-avail {
    font-size: 13px;
    font-weight: bold;
    color: #fff;
  }

  .slot-price {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
  }

  /* Mobile filter button (hidden on desktop) */
  #filters-btn {
    display: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 5px 14px;
    border: 1px solid #999;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    white-space: nowrap;
  }

  /* Mobile filter overlay (never shown on desktop) */
  #filter-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 100;
    flex-direction: column;
  }

  #overlay-header {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid #ccc;
    flex-shrink: 0;
  }

  #overlay-title {
    flex: 1;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
  }

  #overlay-close {
    font-size: 26px;
    line-height: 1;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    color: #111;
    padding: 0 4px;
    width: 40px;
  }

  #overlay-body {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .m-filter-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .m-filter-label {
    font-size: 15px;
    font-weight: 600;
  }

  .m-filter-group .toggle-btn {
    font-size: 15px;
    padding: 9px 20px;
  }

  .m-checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    cursor: pointer;
  }

  .m-checkbox-label input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
  }

  #m-from-time, #m-to-time {
    font-family: inherit;
    font-size: 15px;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    outline: none;
    width: 100%;
  }

  #apply-btn {
    margin: 16px 20px 28px;
    padding: 15px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    flex-shrink: 0;
  }

  #info-btn {
    font-family: inherit;
    font-size: 14px;
    padding: 5px 12px;
    border: 1px solid #999;
    border-radius: 4px;
    background: #fff;
    color: #111;
    cursor: pointer;
    white-space: nowrap;
  }

  #info-btn:hover { background: #f0f0f0; }

  #info-overlay, #loc-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  #info-overlay.open, #loc-overlay.open { display: flex; }

  #info-card, #loc-card {
    background: #fff;
    border-radius: 10px;
    max-width: 440px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 22px 26px 26px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
  }

  #loc-btn {
    font-family: inherit;
    font-size: 14px;
    padding: 4px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    line-height: 1.2;
  }

  #loc-btn:hover { background: #f0f0f0; }

  #loc-indicator {
    font-size: 12px;
    color: #2d7a3a;
    white-space: nowrap;
  }

  .loc-text { font-size: 14px; color: #333; margin: 6px 0 16px; line-height: 1.4; }

  #loc-gps-btn {
    width: 100%;
    padding: 11px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
  }

  .loc-or { text-align: center; color: #999; font-size: 13px; margin: 12px 0; }

  .loc-manual { display: flex; gap: 8px; }

  #loc-input {
    flex: 1;
    font-family: inherit;
    font-size: 14px;
    padding: 9px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
  }

  #loc-go-btn {
    padding: 9px 16px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
  }

  .loc-status { font-size: 13px; color: #666; margin-top: 12px; min-height: 18px; }

  .th-km { font-weight: 400; font-size: 11px; opacity: 0.85; }

  #info-card-header {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }

  #info-title {
    flex: 1;
    font-size: 18px;
    font-weight: 600;
  }

  #info-close {
    font-size: 26px;
    line-height: 1;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    color: #111;
    padding: 0 4px;
  }

  .info-h {
    font-size: 14px;
    font-weight: 600;
    margin: 14px 0 8px;
  }

  #info-courses {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 16px;
  }

  #info-courses li {
    font-size: 14px;
    padding: 2px 0;
    border-bottom: 1px solid #f0f0f0;
  }

  .info-credit {
    margin-top: 18px;
    font-size: 13px;
    color: #666;
  }

  @media (max-width: 600px) {
    .desktop-filter { display: none; }
    #filters-btn { display: block; }
    #filter-overlay.open { display: flex; }
    #info-courses { grid-template-columns: 1fr; }
  }
</style>
</head>

    <button id="loc-btn" title="Set your location">&#128205;</button>

  <button id="filters-btn">Filters</button>

  <div id="overlay-header">

    <span id="overlay-title">Filters</span>

  <div id="overlay-body">
    <div class="m-filter-group">
      <span class="m-filter-label">Players</span>
      <div class="toggle-group" id="m-players-group">
        <button class="toggle-btn" data-value="1">1</button>
        <button class="toggle-btn active" data-value="2">2</button>

<script>
  const COURSE_ORDER = [
    "Hoge Dijk", "Waterland", "Spaarnwoude", "Wilnis",
    "De Purmer", "Zaanse", "Amsteldijk", "Liemeer",
    "Heemskerk", "Bergvliet", "Haenen", "De Loonsche Duynen",
    "Rijk van Nunspeet",
  ];
  const COURSE_COLORS = {
    "Hoge Dijk":           { main: "#1a6b3c", sub: "#256e42" },
    "Spaarnwoude":         { main: "#1a3a6b", sub: "#24416e" },
    "Liemeer":             { main: "#3a6b1a", sub: "#42712a" },
    "Bergvliet":           { main: "#1a5a6b", sub: "#246070" },
    "Wilnis":              { main: "#6b3a1a", sub: "#704224" },
    "Zaanse":              { main: "#5a1a6b", sub: "#622472" },
    "De Purmer":           { main: "#6b1a3a", sub: "#721e42" },
    "De Loonsche Duynen":  { main: "#6b1a3a", sub: "#7d2a4e" },
    "Waterland":           { main: "#6b4e1a", sub: "#705524" },
    "Amsteldijk":          { main: "#6b1a1a", sub: "#721e1e" },
    "Heemskerk":           { main: "#1a1a6b", sub: "#242472" },
    "Haenen":              { main: "#1a1a6b", sub: "#2e2e7d" },
    "Rijk van Nunspeet":   { main: "#2d5a2d", sub: "#336633" },
  };

  // Course coordinates (geocoded via OpenStreetMap, verified per club).
  const COURSE_COORDS = {
    "Hoge Dijk":          { lat: 52.28711, lon: 4.95976 },
    "Waterland":          { lat: 52.40561, lon: 4.95225 },
    "Spaarnwoude":        { lat: 52.42886, lon: 4.69618 },
    "Wilnis":             { lat: 52.18857, lon: 4.89142 },
    "De Purmer":          { lat: 52.50175, lon: 4.99675 },
    "Zaanse":             { lat: 52.47300, lon: 4.86831 },
    "Amsteldijk":         { lat: 52.29891, lon: 4.89778 },
    "Liemeer":            { lat: 52.18895, lon: 4.73783 },
    "Heemskerk":          { lat: 52.49205, lon: 4.70795 },
    "Bergvliet":          { lat: 51.63920, lon: 4.79748 },
    "Haenen":             { lat: 51.61445, lon: 4.83720 },
    "De Loonsche Duynen": { lat: 51.65748, lon: 5.06648 },
    "Rijk van Nunspeet":  { lat: 52.36771, lon: 5.79827 },
  };

  function haversineKm(a, b) {
    const R = 6371;
    const dLat = (b.lat - a.lat) * Math.PI / 180;
    const dLon = (b.lon - a.lon) * Math.PI / 180;
    const la1 = a.lat * Math.PI / 180, la2 = b.lat * Math.PI / 180;
    const h = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLon / 2) ** 2;
    return 2 * R * Math.asin(Math.sqrt(h));
  }

  function courseKm(courseName) {
    if (!userCoords) return null;
    const c = COURSE_COORDS[courseName];
    if (!c) { console.warn('No coordinates for course:', courseName); return null; }
    return haversineKm(userCoords, c);
  }

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  const dateInput = document.getElementById('date-input');
  dateInput.value = todayStr();

  let players = 2;
  let holes = 'all';
  let fromTime = '10:00';
  let toTime = '20:00';
  let includePar3 = false;
  let includeChampionship = true;
  let maxKm = null;        // null = Any distance
  let userCoords = null;   // { lat, lon, label }
  let lastData = null;     // most recent server response, for client-side re-filtering

  try {
    const saved = JSON.parse(localStorage.getItem('userCoords'));
    if (saved && typeof saved.lat === 'number' && typeof saved.lon === 'number') userCoords = saved;
  } catch (e) { /* no/invalid saved location */ }

  // Desktop filter listeners
  const fromTimeSelect = document.getElementById('from-time');
  fromTimeSelect.addEventListener('change', () => { fromTime = fromTimeSelect.value; applyFilters(); });

  const toTimeSelect = document.getElementById('to-time');
  toTimeSelect.addEventListener('change', () => { toTime = toTimeSelect.value; applyFilters(); });

  // Distance + location
  const distanceSelect = document.getElementById('distance');
  distanceSelect.addEventListener('change', () => onDistanceChange(distanceSelect.value));

  function syncDistanceControls(val) {
    distanceSelect.value = val;
    document.querySelectorAll('#m-distance-group .toggle-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.value === val);
    });
  }

  function onDistanceChange(val) {
    maxKm = val === 'any' ? null : Number(val);
    syncDistanceControls(val);
    if (maxKm !== null && !userCoords) {
      openLocModal();
    } else {
      applyFilters();
    }
  }

  function updateLocIndicator() {
    const label = userCoords ? ('\u{1F4CD} ' + (userCoords.label || 'set')) : '';
    document.getElementById('loc-indicator').textContent = label;
    document.getElementById('m-loc-indicator').textContent = label;
  }

  const locOverlay = document.getElementById('loc-overlay');
  function openLocModal() { document.getElementById('loc-status').textContent = ''; locOverlay.classList.add('open'); }
  function closeLocModal() { locOverlay.classList.remove('open'); }

  document.getElementById('loc-btn').addEventListener('click', openLocModal);
  document.getElementById('loc-close').addEventListener('click', () => {
    closeLocModal();
    if (!userCoords) { maxKm = null; syncDistanceControls('any'); applyFilters(); }
  });
  locOverlay.addEventListener('click', e => { if (e.target === locOverlay) document.getElementById('loc-close').click(); });

  function setUserCoords(coords) {
    userCoords = coords;
    try { localStorage.setItem('userCoords', JSON.stringify(coords)); } catch (e) { /* storage unavailable */ }
    updateLocIndicator();
    closeLocModal();
    applyFilters();
  }

  document.getElementById('loc-gps-btn').addEventListener('click', () => {
    const status = document.getElementById('loc-status');
    if (!navigator.geolocation) { status.textContent = 'Geolocation is not supported here — enter a town or postcode instead.'; return; }
    status.textContent = 'Locating…';
    navigator.geolocation.getCurrentPosition(
      pos => setUserCoords({ lat: pos.coords.latitude, lon: pos.coords.longitude, label: 'My location' }),
      err => { status.textContent = 'Could not get your location (' + err.message + '). Enter a town or postcode instead.'; },
      { enableHighAccuracy: false, timeout: 10000, maximumAge: 600000 }
    );
  });

  async function geocodeManual() {
    const status = document.getElementById('loc-status');
    const q = document.getElementById('loc-input').value.trim();
    if (!q) return;
    status.textContent = 'Searching…';
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=nl&q=' + encodeURIComponent(q);
    let d;
    try {
      const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!res.ok) throw new Error('lookup failed (' + res.status + ')');
      d = await res.json();
    } catch (e) {
      status.textContent = 'Location lookup failed: ' + e.message;
      return;
    }
    if (!d.length) { status.textContent = 'No match found. Try a different town or postcode.'; return; }
    setUserCoords({ lat: parseFloat(d[0].lat), lon: parseFloat(d[0].lon), label: q });
  }

  document.getElementById('loc-go-btn').addEventListener('click', geocodeManual);
  document.getElementById('loc-input').addEventListener('keydown', e => { if (e.key === 'Enter') geocodeManual(); });
  document.getElementById('m-loc-btn').addEventListener('click', openLocModal);
  setupMobileToggle('m-distance-group');
  updateLocIndicator();

  const includePar3Checkbox = document.getElementById('include-par3');
  includePar3Checkbox.addEventListener('change', () => { includePar3 = includePar3Checkbox.checked; fetchData(); });

  const includeChampionshipCheckbox = document.getElementById('include-championship');
  includeChampionshipCheckbox.addEventListener('change', () => { includeChampionship = includeChampionshipCheckbox.checked; fetchData(); });

  function setupToggle(groupId, onChange) {
    const group = document.getElementById(groupId);
    group.addEventListener('click', e => {
      const btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onChange(btn.dataset.value);
    });
  }

  setupToggle('players-group', v => { players = v; fetchData(); });
  setupToggle('holes-group',   v => { holes   = v; fetchData(); });
  dateInput.addEventListener('change', fetchData);

  // Mobile toggle groups (update active state only, no fetch)
  function setupMobileToggle(groupId) {
    const group = document.getElementById(groupId);
    group.addEventListener('click', e => {
      const btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  }

  setupMobileToggle('m-players-group');
  setupMobileToggle('m-holes-group');

  // Sync current state into mobile overlay controls
  function syncMobileFilters() {
    document.querySelectorAll('#m-players-group .toggle-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.value === String(players));
    });
    document.querySelectorAll('#m-holes-group .toggle-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.value === String(holes));
    });
    document.getElementById('m-include-championship').checked = includeChampionship;
    document.getElementById('m-include-par3').checked = includePar3;
    document.getElementById('m-from-time').value = fromTime;
    document.getElementById('m-to-time').value = toTime;
    const distVal = maxKm === null ? 'any' : String(maxKm);
    document.querySelectorAll('#m-distance-group .toggle-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.value === distVal);
    });
  }

  const filterOverlay = document.getElementById('filter-overlay');

  document.getElementById('filters-btn').addEventListener('click', () => {
    syncMobileFilters();
    filterOverlay.classList.add('open');
  });

  document.getElementById('overlay-close').addEventListener('click', () => {
    filterOverlay.classList.remove('open');
  });

  document.getElementById('apply-btn').addEventListener('click', () => {
    const mPlayersBtn = document.querySelector('#m-players-group .toggle-btn.active');
    if (mPlayersBtn) players = mPlayersBtn.dataset.value;

    const mHolesBtn = document.querySelector('#m-holes-group .toggle-btn.active');
    if (mHolesBtn) holes = mHolesBtn.dataset.value;

    includeChampionship = document.getElementById('m-include-championship').checked;
    includePar3 = document.getElementById('m-include-par3').checked;
    fromTime = document.getElementById('m-from-time').value;
    toTime = document.getElementById('m-to-time').value;

    const mDistBtn = document.querySelector('#m-distance-group .toggle-btn.active');
    const distVal = mDistBtn ? mDistBtn.dataset.value : 'any';
    maxKm = distVal === 'any' ? null : Number(distVal);
    syncDistanceControls(distVal);

    filterOverlay.classList.remove('open');
    fetchData();
    if (maxKm !== null && !userCoords) openLocModal();
  });

  // Info modal
  const infoCourses = document.getElementById('info-courses');
  [...COURSE_ORDER].sort((a, b) => a.localeCompare(b)).forEach(name => {
    const li = document.createElement('li');
    li.textContent = name;
    infoCourses.appendChild(li);
  });

  const infoOverlay = document.getElementById('info-overlay');
  document.getElementById('info-btn').addEventListener('click', () => infoOverlay.classList.add('open'));
  document.getElementById('info-close').addEventListener('click', () => infoOverlay.classList.remove('open'));
  infoOverlay.addEventListener('click', e => {
    if (e.target === infoOverlay) infoOverlay.classList.remove('open');
  });

  async function fetchData() {
    const status = document.getElementById('status');
    const container = document.getElementById('table-container');
    const message = document.getElementById('message');

    status.textContent = 'Refreshing...';

    const params = new URLSearchParams({
      date: dateInput.value,
      players: players,
      holes: holes,
      include_par3: includePar3,
      include_championship: includeChampionship,
    });

    let data;
    try {
      const res = await fetch(`/api/tee-times?${params}`);
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      data = await res.json();
    } catch (err) {
      status.textContent = '';
      message.style.display = 'flex';
      message.className = 'error';
      message.textContent = `Failed to load tee times: ${err.message}`;
      const oldTable = container.querySelector('table');
      if (oldTable) oldTable.remove();
      return;
    }

    status.textContent = '';
    lastData = data;
    applyFilters();
  }

  function applyFilters() {
    const container = document.getElementById('table-container');
    const message = document.getElementById('message');
    if (!lastData) return;

    let visible = lastData.filter(r => r.time >= fromTime && r.time <= toTime);

    if (maxKm !== null && userCoords) {
      visible = visible.filter(r => {
        const km = courseKm(r.course);
        return km !== null && km <= maxKm;
      });
    }

    if (visible.length === 0) {
      message.style.display = 'flex';
      message.className = '';
      message.textContent = 'No tee times found for these filters.';
      const oldTable = container.querySelector('table');
      if (oldTable) oldTable.remove();
      return;
    }

    message.style.display = 'none';

    renderTable(visible, container);
  }

  function renderTable(data, container) {
    const colMap = new Map();

    for (const row of data) {
      const key = `${row.course}|||${row.sub_course}|||${row.holes}`;
      if (!colMap.has(key)) {
        colMap.set(key, { course: row.course, sub_course: row.sub_course, holes: row.holes });
      }
    }

    const cols = Array.from(colMap.values()).sort((a, b) => {
      const oa = COURSE_ORDER.indexOf(a.course);
      const ob = COURSE_ORDER.indexOf(b.course);
      if (oa !== ob) return (oa === -1 ? 999 : oa) - (ob === -1 ? 999 : ob);
      if (a.sub_course !== b.sub_course) return a.sub_course.localeCompare(b.sub_course);
      return a.holes - b.holes;
    });

    const timeSet = new Set(data.map(r => r.time));
    const times = Array.from(timeSet).sort();

    const lookup = new Map();
    for (const row of data) {
      const key = `${row.course}|||${row.sub_course}|||${row.holes}|||${row.time}`;
      lookup.set(key, row);
    }

    const courseGroups = [];
    let i = 0;
    while (i < cols.length) {
      const course = cols[i].course;
      let j = i;
      while (j < cols.length && cols[j].course === course) j++;
      courseGroups.push({ course, start: i, count: j - i });
      i = j;
    }

    const table = document.createElement('table');

    const thead = document.createElement('thead');

    const tr1 = document.createElement('tr');
    const thTime = document.createElement('th');
    thTime.rowSpan = 2;
    thTime.textContent = 'Time';
    thTime.className = 'th-time';
    tr1.appendChild(thTime);

    for (const grp of courseGroups) {
      const th = document.createElement('th');
      th.colSpan = grp.count;
      th.textContent = grp.course;
      const km = courseKm(grp.course);
      if (km !== null) {
        const kmSpan = document.createElement('span');
        kmSpan.className = 'th-km';
        kmSpan.textContent = ' · ' + Math.round(km) + ' km';
        th.appendChild(kmSpan);
      }
      th.className = 'th-course';
      const colors = COURSE_COLORS[grp.course] || { main: '#444', sub: '#666' };
      th.style.background = colors.main;
      th.style.borderLeft = '3px solid #000';
      tr1.appendChild(th);
    }
    thead.appendChild(tr1);

    const clubBoundaries = new Set();
    cols.forEach((col, idx) => {
      if (idx === 0 || col.course !== cols[idx - 1].course) clubBoundaries.add(idx);
    });

    const tr2 = document.createElement('tr');
    for (let ci = 0; ci < cols.length; ci++) {
      const col = cols[ci];
      const th = document.createElement('th');
      const shortName = col.sub_course.replace(/baan$/i, '');
      th.textContent = `${shortName} ${col.holes}`;
      th.className = 'th-sub';
      const colors = COURSE_COLORS[col.course] || { main: '#444', sub: '#666' };
      th.style.background = colors.sub;
      if (clubBoundaries.has(ci)) th.style.borderLeft = '3px solid #000';
      tr2.appendChild(th);
    }
    thead.appendChild(tr2);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    for (const time of times) {
      const tr = document.createElement('tr');

      const tdTime = document.createElement('td');
      tdTime.textContent = time;
      tdTime.className = 'td-time';
      tr.appendChild(tdTime);

      for (let ci = 0; ci < cols.length; ci++) {
        const col = cols[ci];
        const key = `${col.course}|||${col.sub_course}|||${col.holes}|||${time}`;
        const slot = lookup.get(key);
        const td = document.createElement('td');
        if (clubBoundaries.has(ci)) td.style.borderLeft = '3px solid #000';

        if (slot) {
          td.className = 'td-slot';
          td.style.background = slot.free_slots >= 4 ? '#2d7a3a' : slot.free_slots >= 2 ? '#5a9e65' : '#8aba8f';
          td.setAttribute('role', 'button');
          td.tabIndex = 0;
          td.addEventListener('click', () => window.open(slot.booking_url, '_blank'));
          td.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') window.open(slot.booking_url, '_blank'); });

          const line = document.createElement('div');
          line.style.cssText = 'display:flex;align-items:baseline;justify-content:center;gap:5px';

          const availSpan = document.createElement('span');
          availSpan.className = 'slot-avail';
          availSpan.textContent = `${slot.free_slots}/${slot.total_slots}`;
          line.appendChild(availSpan);

          if (slot.price_eur !== null && slot.price_eur !== undefined) {
            const priceSpan = document.createElement('span');
            priceSpan.className = 'slot-price';
            priceSpan.textContent = `€${Math.round(slot.price_eur)}`;
            line.appendChild(priceSpan);
          }

          td.appendChild(line);
        } else {
          td.className = 'td-empty';
        }

        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }
    table.appendChild(tbody);

    const oldTable = container.querySelector('table');
    if (oldTable) oldTable.remove();
    container.appendChild(table);
  }

  fetchData();
</script>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
