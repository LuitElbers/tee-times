<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tee Times</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #fff;
    color: #111;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  #filter-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #fff;
    border-bottom: 1px solid #ccc;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-group label {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
  }

  #date-input, #from-time, #to-time {
    font-family: inherit;
    font-size: 14px;
    padding: 4px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    outline: none;
  }

  #date-input:focus, #from-time:focus, #to-time:focus {
    border-color: #555;
  }

  .toggle-group {
    display: flex;
    gap: 4px;
  }

  .toggle-btn {
    font-family: inherit;
    font-size: 13px;
    padding: 4px 10px;
    border: 1px solid #999;
    border-radius: 4px;
    background: #fff;
    color: #111;
    cursor: pointer;
    line-height: 1.4;
  }

  .toggle-btn.active {
    background: #222;
    color: #fff;
    border-color: #222;
  }

  .toggle-btn:hover:not(.active) {
    background: #f0f0f0;
  }

  #status {
    font-size: 13px;
    color: #888;
    margin-left: auto;
  }

  #table-container {
    flex: 1;
    overflow: auto;
  }

  #message {
    display: none;
    justify-content: center;
    align-items: center;
    height: 100%;
    font-size: 15px;
  }

  #message.error {
    color: #c00;
  }

  table {
    border-collapse: collapse;
    min-width: 100%;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 5;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 0;
  }

  .th-course {
    font-size: 13px;
    font-weight: bold;
    color: #fff;
    text-align: center;
    padding: 6px 10px;
    white-space: nowrap;
  }

  .th-sub {
    font-size: 12px;
    color: #fff;
    text-align: center;
    padding: 5px 8px;
    white-space: nowrap;
  }

  .th-time {
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    padding: 6px 8px;
    width: 65px;
    min-width: 65px;
  }

  .td-time {
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    background: #fff;
    width: 65px;
    min-width: 65px;
    position: sticky;
    left: 0;
    z-index: 2;
    padding: 6px 4px;
    white-space: nowrap;
  }

  .td-slot {
    text-align: center;
    padding: 4px 8px;
    min-width: 80px;
    cursor: pointer;
    vertical-align: middle;
  }

  .td-slot:hover {
    filter: brightness(1.15);
  }

  .td-empty {
    background: #eee;
    min-width: 80px;
  }

  .slot-avail {
    font-size: 13px;
    font-weight: bold;
    color: #fff;
  }

  .slot-price {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
  }

  /* Mobile filter button (hidden on desktop) */
  #filters-btn {
    display: none;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 5px 14px;
    border: 1px solid #999;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    white-space: nowrap;
  }

  /* Mobile filter overlay (never shown on desktop) */
  #filter-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 100;
    flex-direction: column;
  }

  #overlay-header {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid #ccc;
    flex-shrink: 0;
  }

  #overlay-title {
    flex: 1;
    text-align: center;
    font-size: 16px;
    font-weight: 600;
  }

  #overlay-close {
    font-size: 26px;
    line-height: 1;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    color: #111;
    padding: 0 4px;
    width: 40px;
  }

  #overlay-body {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .m-filter-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .m-filter-label {
    font-size: 15px;
    font-weight: 600;
  }

  .m-filter-group .toggle-btn {
    font-size: 15px;
    padding: 9px 20px;
  }

  .m-checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    cursor: pointer;
  }

  .m-checkbox-label input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
  }

  #m-from-time, #m-to-time {
    font-family: inherit;
    font-size: 15px;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    outline: none;
    width: 100%;
  }

  #apply-btn {
    margin: 16px 20px 28px;
    padding: 15px;
    background: #222;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    flex-shrink: 0;
  }

  #info-btn {
    font-family: inherit;
    font-size: 14px;
    padding: 5px 12px;
    border: 1px solid #999;
    border-radius: 4px;
    background: #fff;
    color: #111;
    cursor: pointer;
    white-space: nowrap;
  }

  #info-btn:hover { background: #f0f0f0; }

  #info-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  #info-overlay.open { display: flex; }

  #info-card {
    background: #fff;
    border-radius: 10px;
    max-width: 440px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 22px 26px 26px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
  }

  #info-card-header {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }

  #info-title {
    flex: 1;
    font-size: 18px;
    font-weight: 600;
  }

  #info-close {
    font-size: 26px;
    line-height: 1;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    color: #111;
    padding: 0 4px;
  }

  .info-h {
    font-size: 14px;
    font-weight: 600;
    margin: 14px 0 8px;
  }

  #info-courses {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 16px;
  }

  #info-courses li {
    font-size: 14px;
    padding: 2px 0;
    border-bottom: 1px solid #f0f0f0;
  }

  .info-credit {
    margin-top: 18px;
    font-size: 13px;
    color: #666;
  }

  @media (max-width: 600px) {
    .desktop-filter { display: none; }
    #filters-btn { display: block; }
    #filter-overlay.open { display: flex; }
    #info-courses { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="filter-bar">
  <div class="filter-group">
    <label for="date-input">Date:</label>
    <input type="date" id="date-input">
  </div>
  <div class="filter-group desktop-filter">
    <label>Players:</label>
    <div class="toggle-group" id="players-group">
      <button class="toggle-btn" data-value="1">1</button>
      <button class="toggle-btn active" data-value="2">2</button>
      <button class="toggle-btn" data-value="3">3</button>
      <button class="toggle-btn" data-value="4">4</button>
    </div>
  </div>
  <div class="filter-group desktop-filter">
    <label>Holes:</label>
    <div class="toggle-group" id="holes-group">
      <button class="toggle-btn" data-value="9">9</button>
      <button class="toggle-btn" data-value="18">18</button>
      <button class="toggle-btn active" data-value="all">All</button>
    </div>
  </div>
  <div class="filter-group desktop-filter">
    <label><input type="checkbox" id="include-championship" checked> Championship</label>
    <label><input type="checkbox" id="include-par3"> Par 3/4</label>
  </div>
  <div class="filter-group desktop-filter">
    <label for="from-time">Teetime From:</label>
    <select id="from-time">
      <option value="09:00">9:00</option>
      <option value="10:00" selected>10:00</option>
      <option value="11:00">11:00</option>
      <option value="12:00">12:00</option>
      <option value="13:00">13:00</option>
      <option value="14:00">14:00</option>
      <option value="15:00">15:00</option>
      <option value="16:00">16:00</option>
      <option value="17:00">17:00</option>
      <option value="18:00">18:00</option>
      <option value="19:00">19:00</option>
      <option value="20:00">20:00</option>
    </select>
  </div>
  <div class="filter-group desktop-filter">
    <label for="to-time">Teetime To:</label>
    <select id="to-time">
      <option value="09:00">9:00</option>
      <option value="10:00">10:00</option>
      <option value="11:00">11:00</option>
      <option value="12:00">12:00</option>
      <option value="13:00">13:00</option>
      <option value="14:00">14:00</option>
      <option value="15:00">15:00</option>
      <option value="16:00">16:00</option>
      <option value="17:00">17:00</option>
      <option value="18:00">18:00</option>
      <option value="19:00">19:00</option>
      <option value="20:00" selected>20:00</option>
    </select>
  </div>
  <button id="filters-btn">Filters</button>
  <span id="status"></span>
  <button id="info-btn">Info</button>
</div>

<div id="filter-overlay">
  <div id="overlay-header">
    <button id="overlay-close">&#215;</button>
    <span id="overlay-title">Filters</span>
    <span style="width:40px"></span>
  </div>
  <div id="overlay-body">
    <div class="m-filter-group">
      <span class="m-filter-label">Players</span>
      <div class="toggle-group" id="m-players-group">
        <button class="toggle-btn" data-value="1">1</button>
        <button class="toggle-btn active" data-value="2">2</button>
        <button class="toggle-btn" data-value="3">3</button>
        <button class="toggle-btn" data-value="4">4</button>
      </div>
    </div>
    <div class="m-filter-group">
      <span class="m-filter-label">Holes</span>
      <div class="toggle-group" id="m-holes-group">
        <button class="toggle-btn" data-value="9">9</button>
        <button class="toggle-btn" data-value="18">18</button>
        <button class="toggle-btn active" data-value="all">All</button>
      </div>
    </div>
    <div class="m-filter-group">
      <span class="m-filter-label">Course type</span>
      <label class="m-checkbox-label">
        <input type="checkbox" id="m-include-championship" checked>
        Championship
      </label>
      <label class="m-checkbox-label">
        <input type="checkbox" id="m-include-par3">
        Par 3/4
      </label>
    </div>
    <div class="m-filter-group">
      <label class="m-filter-label" for="m-from-time">Teetime From</label>
      <select id="m-from-time">
        <option value="09:00">9:00</option>
        <option value="10:00" selected>10:00</option>
        <option value="11:00">11:00</option>
        <option value="12:00">12:00</option>
        <option value="13:00">13:00</option>
        <option value="14:00">14:00</option>
        <option value="15:00">15:00</option>
        <option value="16:00">16:00</option>
        <option value="17:00">17:00</option>
        <option value="18:00">18:00</option>
        <option value="19:00">19:00</option>
        <option value="20:00">20:00</option>
      </select>
    </div>
    <div class="m-filter-group">
      <label class="m-filter-label" for="m-to-time">Teetime To</label>
      <select id="m-to-time">
        <option value="09:00">9:00</option>
        <option value="10:00">10:00</option>
        <option value="11:00">11:00</option>
        <option value="12:00">12:00</option>
        <option value="13:00">13:00</option>
        <option value="14:00">14:00</option>
        <option value="15:00">15:00</option>
        <option value="16:00">16:00</option>
        <option value="17:00">17:00</option>
        <option value="18:00">18:00</option>
        <option value="19:00">19:00</option>
        <option value="20:00" selected>20:00</option>
      </select>
    </div>
  </div>
  <button id="apply-btn">Apply</button>
</div>

<div id="info-overlay">
  <div id="info-card">
    <div id="info-card-header">
      <span id="info-title">Info</span>
      <button id="info-close">&#215;</button>
    </div>
    <h3 class="info-h">Courses covered</h3>
    <ul id="info-courses"></ul>
    <p class="info-credit">Made by Luit Elbers</p>
  </div>
</div>

<div id="table-container">
  <div id="message"></div>
</div>

<script>
  const COURSE_ORDER = [
    "Hoge Dijk", "Waterland", "Spaarnwoude", "Wilnis",
    "De Purmer", "Zaanse", "Amsteldijk", "Liemeer",
    "Heemskerk", "Bergvliet", "Haenen", "De Loonsche Duynen",
    "Rijk van Nunspeet",
  ];
  const COURSE_COLORS = {
    "Hoge Dijk":           { main: "#1a6b3c", sub: "#256e42" },
    "Spaarnwoude":         { main: "#1a3a6b", sub: "#24416e" },
    "Liemeer":             { main: "#3a6b1a", sub: "#42712a" },
    "Bergvliet":           { main: "#1a5a6b", sub: "#246070" },
    "Wilnis":              { main: "#6b3a1a", sub: "#704224" },
    "Zaanse":              { main: "#5a1a6b", sub: "#622472" },
    "De Purmer":           { main: "#6b1a3a", sub: "#721e42" },
    "De Loonsche Duynen":  { main: "#6b1a3a", sub: "#7d2a4e" },
    "Waterland":           { main: "#6b4e1a", sub: "#705524" },
    "Amsteldijk":          { main: "#6b1a1a", sub: "#721e1e" },
    "Heemskerk":           { main: "#1a1a6b", sub: "#242472" },
    "Haenen":              { main: "#1a1a6b", sub: "#2e2e7d" },
    "Rijk van Nunspeet":   { main: "#2d5a2d", sub: "#336633" },
  };

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  const dateInput = document.getElementById('date-input');
  dateInput.value = todayStr();

  let players = 2;
  let holes = 'all';
  let fromTime = '10:00';
  let toTime = '20:00';
  let includePar3 = false;
  let includeChampionship = true;

  // Desktop filter listeners
  const fromTimeSelect = document.getElementById('from-time');
  fromTimeSelect.addEventListener('change', () => { fromTime = fromTimeSelect.value; fetchData(); });

  const toTimeSelect = document.getElementById('to-time');
  toTimeSelect.addEventListener('change', () => { toTime = toTimeSelect.value; fetchData(); });

  const includePar3Checkbox = document.getElementById('include-par3');
  includePar3Checkbox.addEventListener('change', () => { includePar3 = includePar3Checkbox.checked; fetchData(); });

  const includeChampionshipCheckbox = document.getElementById('include-championship');
  includeChampionshipCheckbox.addEventListener('change', () => { includeChampionship = includeChampionshipCheckbox.checked; fetchData(); });

  function setupToggle(groupId, onChange) {
    const group = document.getElementById(groupId);
    group.addEventListener('click', e => {
      const btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onChange(btn.dataset.value);
    });
  }

  setupToggle('players-group', v => { players = v; fetchData(); });
  setupToggle('holes-group',   v => { holes   = v; fetchData(); });
  dateInput.addEventListener('change', fetchData);

  // Mobile toggle groups (update active state only, no fetch)
  function setupMobileToggle(groupId) {
    const group = document.getElementById(groupId);
    group.addEventListener('click', e => {
      const btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  }

  setupMobileToggle('m-players-group');
  setupMobileToggle('m-holes-group');

  // Sync current state into mobile overlay controls
  function syncMobileFilters() {
    document.querySelectorAll('#m-players-group .toggle-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.value === String(players));
    });
    document.querySelectorAll('#m-holes-group .toggle-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.value === String(holes));
    });
    document.getElementById('m-include-championship').checked = includeChampionship;
    document.getElementById('m-include-par3').checked = includePar3;
    document.getElementById('m-from-time').value = fromTime;
    document.getElementById('m-to-time').value = toTime;
  }

  const filterOverlay = document.getElementById('filter-overlay');

  document.getElementById('filters-btn').addEventListener('click', () => {
    syncMobileFilters();
    filterOverlay.classList.add('open');
  });

  document.getElementById('overlay-close').addEventListener('click', () => {
    filterOverlay.classList.remove('open');
  });

  document.getElementById('apply-btn').addEventListener('click', () => {
    const mPlayersBtn = document.querySelector('#m-players-group .toggle-btn.active');
    if (mPlayersBtn) players = mPlayersBtn.dataset.value;

    const mHolesBtn = document.querySelector('#m-holes-group .toggle-btn.active');
    if (mHolesBtn) holes = mHolesBtn.dataset.value;

    includeChampionship = document.getElementById('m-include-championship').checked;
    includePar3 = document.getElementById('m-include-par3').checked;
    fromTime = document.getElementById('m-from-time').value;
    toTime = document.getElementById('m-to-time').value;

    filterOverlay.classList.remove('open');
    fetchData();
  });

  // Info modal
  const infoCourses = document.getElementById('info-courses');
  [...COURSE_ORDER].sort((a, b) => a.localeCompare(b)).forEach(name => {
    const li = document.createElement('li');
    li.textContent = name;
    infoCourses.appendChild(li);
  });

  const infoOverlay = document.getElementById('info-overlay');
  document.getElementById('info-btn').addEventListener('click', () => infoOverlay.classList.add('open'));
  document.getElementById('info-close').addEventListener('click', () => infoOverlay.classList.remove('open'));
  infoOverlay.addEventListener('click', e => {
    if (e.target === infoOverlay) infoOverlay.classList.remove('open');
  });

  async function fetchData() {
    const status = document.getElementById('status');
    const container = document.getElementById('table-container');
    const message = document.getElementById('message');

    status.textContent = 'Refreshing...';

    const params = new URLSearchParams({
      date: dateInput.value,
      players: players,
      holes: holes,
      include_par3: includePar3,
      include_championship: includeChampionship,
    });

    let data;
    try {
      const res = await fetch(`/api/tee-times?${params}`);
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      data = await res.json();
    } catch (err) {
      status.textContent = '';
      message.style.display = 'flex';
      message.className = 'error';
      message.textContent = `Failed to load tee times: ${err.message}`;
      const oldTable = container.querySelector('table');
      if (oldTable) oldTable.remove();
      return;
    }

    status.textContent = '';

    if (data.length === 0) {
      message.style.display = 'flex';
      message.className = '';
      message.textContent = 'No tee times found for these filters.';
      const oldTable = container.querySelector('table');
      if (oldTable) oldTable.remove();
      return;
    }

    message.style.display = 'none';

    renderTable(data, container);
  }

  function renderTable(data, container) {
    const colMap = new Map();

    for (const row of data) {
      const key = `${row.course}|||${row.sub_course}|||${row.holes}`;
      if (!colMap.has(key)) {
        colMap.set(key, { course: row.course, sub_course: row.sub_course, holes: row.holes });
      }
    }

    const cols = Array.from(colMap.values()).sort((a, b) => {
      const oa = COURSE_ORDER.indexOf(a.course);
      const ob = COURSE_ORDER.indexOf(b.course);
      if (oa !== ob) return (oa === -1 ? 999 : oa) - (ob === -1 ? 999 : ob);
      if (a.sub_course !== b.sub_course) return a.sub_course.localeCompare(b.sub_course);
      return a.holes - b.holes;
    });

    const timeSet = new Set(data.filter(r => r.time >= fromTime && r.time <= toTime).map(r => r.time));
    const times = Array.from(timeSet).sort();

    const lookup = new Map();
    for (const row of data) {
      const key = `${row.course}|||${row.sub_course}|||${row.holes}|||${row.time}`;
      lookup.set(key, row);
    }

    const courseGroups = [];
    let i = 0;
    while (i < cols.length) {
      const course = cols[i].course;
      let j = i;
      while (j < cols.length && cols[j].course === course) j++;
      courseGroups.push({ course, start: i, count: j - i });
      i = j;
    }

    const table = document.createElement('table');

    const thead = document.createElement('thead');

    const tr1 = document.createElement('tr');
    const thTime = document.createElement('th');
    thTime.rowSpan = 2;
    thTime.textContent = 'Time';
    thTime.className = 'th-time';
    tr1.appendChild(thTime);

    for (const grp of courseGroups) {
      const th = document.createElement('th');
      th.colSpan = grp.count;
      th.textContent = grp.course;
      th.className = 'th-course';
      const colors = COURSE_COLORS[grp.course] || { main: '#444', sub: '#666' };
      th.style.background = colors.main;
      th.style.borderLeft = '3px solid #000';
      tr1.appendChild(th);
    }
    thead.appendChild(tr1);

    const clubBoundaries = new Set();
    cols.forEach((col, idx) => {
      if (idx === 0 || col.course !== cols[idx - 1].course) clubBoundaries.add(idx);
    });

    const tr2 = document.createElement('tr');
    for (let ci = 0; ci < cols.length; ci++) {
      const col = cols[ci];
      const th = document.createElement('th');
      const shortName = col.sub_course.replace(/baan$/i, '');
      th.textContent = `${shortName} ${col.holes}`;
      th.className = 'th-sub';
      const colors = COURSE_COLORS[col.course] || { main: '#444', sub: '#666' };
      th.style.background = colors.sub;
      if (clubBoundaries.has(ci)) th.style.borderLeft = '3px solid #000';
      tr2.appendChild(th);
    }
    thead.appendChild(tr2);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    for (const time of times) {
      const tr = document.createElement('tr');

      const tdTime = document.createElement('td');
      tdTime.textContent = time;
      tdTime.className = 'td-time';
      tr.appendChild(tdTime);

      for (let ci = 0; ci < cols.length; ci++) {
        const col = cols[ci];
        const key = `${col.course}|||${col.sub_course}|||${col.holes}|||${time}`;
        const slot = lookup.get(key);
        const td = document.createElement('td');
        if (clubBoundaries.has(ci)) td.style.borderLeft = '3px solid #000';

        if (slot) {
          td.className = 'td-slot';
          td.style.background = slot.free_slots >= 4 ? '#2d7a3a' : slot.free_slots >= 2 ? '#5a9e65' : '#8aba8f';
          td.setAttribute('role', 'button');
          td.tabIndex = 0;
          td.addEventListener('click', () => window.open(slot.booking_url, '_blank'));
          td.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') window.open(slot.booking_url, '_blank'); });

          const line = document.createElement('div');
          line.style.cssText = 'display:flex;align-items:baseline;justify-content:center;gap:5px';

          const availSpan = document.createElement('span');
          availSpan.className = 'slot-avail';
          availSpan.textContent = `${slot.free_slots}/${slot.total_slots}`;
          line.appendChild(availSpan);

          if (slot.price_eur !== null && slot.price_eur !== undefined) {
            const priceSpan = document.createElement('span');
            priceSpan.className = 'slot-price';
            priceSpan.textContent = `€${Math.round(slot.price_eur)}`;
            line.appendChild(priceSpan);
          }

          td.appendChild(line);
        } else {
          td.className = 'td-empty';
        }

        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }
    table.appendChild(tbody);

    const oldTable = container.querySelector('table');
    if (oldTable) oldTable.remove();
    container.appendChild(table);
  }

  fetchData();
</script>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
