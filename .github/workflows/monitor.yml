name: monitor

# Independent of the warmer so it still fires even if warm.yml is completely dead.
# Checks the published warm.json's freshness and Telegram-alerts if the warmer has
# stopped or a group of courses has gone stale. State on the `monitor` branch keeps
# it to one alert per outage (+ every 6h while down, + a recovery note).
on:
  schedule:
    - cron: "15 * * * *"   # hourly, offset from the warmer's :00/:30
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check warmer health + alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Persist monitor state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp monitor_state.json "$RUNNER_TEMP/monitor_state.json"
          git checkout --orphan monitor-tmp
          git rm -rf . >/dev/null 2>&1 || true
          cp "$RUNNER_TEMP/monitor_state.json" monitor_state.json
          git add -f monitor_state.json
          git commit -m "monitor state $(date -u +%FT%TZ)"
          git push -f origin monitor-tmp:monitor
