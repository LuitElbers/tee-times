name: warm

on:
  schedule:
    # teecontrol/nexxchange rate-limit PER IP, so the work is sharded across 3
    # runners (3 IPs) -> each shard ~8-10 min instead of one ~22-min run.
    # Offset minutes (:08/:38), NOT :00/:30: GitHub most often drops scheduled
    # events at the top of the hour, so on-the-hour crons silently don't fire.
    - cron: "8,38 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: warmer
  cancel-in-progress: false

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false          # one shard failing must not cancel the others
      matrix:
        shard: [0, 1, 2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Only shard 0 fetches Waterland (golfmanager), which needs a browser.
      - name: Install Playwright + Chromium (shard 0 only)
        if: matrix.shard == 0
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Fetch shard
        run: python warm.py --shard ${{ matrix.shard }} --of 3

      - uses: actions/upload-artifact@v4
        with:
          name: warm-shard-${{ matrix.shard }}
          path: warm_shard_${{ matrix.shard }}.json
          retention-days: 1
          if-no-files-found: error

  merge:
    needs: warm
    if: always()              # still merge (carry-forward) even if a shard failed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download shard results
        uses: actions/download-artifact@v4
        with:
          path: .
          pattern: warm-shard-*
          merge-multiple: true   # drop all warm_shard_*.json into the workspace root

      - name: Merge shards (carry-forward missing courses from previous warm.json)
        run: python warm.py --merge --of 3

      - name: Publish to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp warm.json "$RUNNER_TEMP/warm.json"
          git checkout --orphan data-tmp
          git rm -rf . >/dev/null 2>&1 || true
          cp "$RUNNER_TEMP/warm.json" warm.json
          git add -f warm.json
          git commit -m "warm $(date -u +%FT%TZ)"
          git push -f origin data-tmp:data
