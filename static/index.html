<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tee Times</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #fff;
    color: #111;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  #filter-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    background: #fff;
    border-bottom: 1px solid #ccc;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-group label {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
  }

  #date-input, #from-time {
    font-family: inherit;
    font-size: 14px;
    padding: 4px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    outline: none;
  }

  #date-input:focus, #from-time:focus {
    border-color: #555;
  }

  .toggle-group {
    display: flex;
    gap: 4px;
  }

  .toggle-btn {
    font-family: inherit;
    font-size: 13px;
    padding: 4px 10px;
    border: 1px solid #999;
    border-radius: 4px;
    background: #fff;
    color: #111;
    cursor: pointer;
    line-height: 1.4;
  }

  .toggle-btn.active {
    background: #222;
    color: #fff;
    border-color: #222;
  }

  .toggle-btn:hover:not(.active) {
    background: #f0f0f0;
  }

  #status {
    font-size: 13px;
    color: #888;
    margin-left: auto;
  }

  #table-container {
    flex: 1;
    overflow: auto;
  }

  #message {
    display: none;
    justify-content: center;
    align-items: center;
    height: 100%;
    font-size: 15px;
  }

  #message.error {
    color: #c00;
  }

  table {
    border-collapse: collapse;
    min-width: 100%;
  }

  thead {
    position: sticky;
    top: 0;
    z-index: 5;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 0;
  }

  .th-course {
    font-size: 13px;
    font-weight: bold;
    color: #fff;
    text-align: center;
    padding: 6px 10px;
    white-space: nowrap;
  }

  .th-sub {
    font-size: 12px;
    color: #fff;
    text-align: center;
    padding: 5px 8px;
    white-space: nowrap;
  }

  .th-time {
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    padding: 6px 8px;
    width: 65px;
    min-width: 65px;
  }

  .td-time {
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    background: #fff;
    width: 65px;
    min-width: 65px;
    position: sticky;
    left: 0;
    z-index: 2;
    padding: 6px 4px;
    white-space: nowrap;
  }

  .td-slot {
    text-align: center;
    padding: 6px 8px;
    min-width: 80px;
    cursor: pointer;
    vertical-align: middle;
  }

  .td-slot:hover {
    filter: brightness(1.15);
  }

  .td-empty {
    background: #eee;
    min-width: 80px;
  }

  .slot-avail {
    font-size: 14px;
    font-weight: bold;
    color: #fff;
    display: block;
    line-height: 1.3;
  }

  .slot-price {
    font-size: 11px;
    color: rgba(255,255,255,0.8);
    display: block;
    line-height: 1.3;
  }
</style>
</head>
<body>

<div id="filter-bar">
  <div class="filter-group">
    <label for="date-input">Date:</label>
    <input type="date" id="date-input">
  </div>
  <div class="filter-group">
    <label>Players:</label>
    <div class="toggle-group" id="players-group">
      <button class="toggle-btn" data-value="1">1</button>
      <button class="toggle-btn active" data-value="2">2</button>
      <button class="toggle-btn" data-value="3">3</button>
      <button class="toggle-btn" data-value="4">4</button>
    </div>
  </div>
  <div class="filter-group">
    <label>Holes:</label>
    <div class="toggle-group" id="holes-group">
      <button class="toggle-btn" data-value="9">9</button>
      <button class="toggle-btn" data-value="18">18</button>
      <button class="toggle-btn active" data-value="all">All</button>
    </div>
  </div>
  <div class="filter-group">
    <label><input type="checkbox" id="include-championship" checked> Championship</label>
    <label><input type="checkbox" id="include-par3"> Par 3/4</label>
  </div>
  <div class="filter-group">
    <label for="from-time">Teetime From:</label>
    <select id="from-time">
      <option value="09:00">9:00</option>
      <option value="10:00" selected>10:00</option>
      <option value="11:00">11:00</option>
      <option value="12:00">12:00</option>
      <option value="13:00">13:00</option>
      <option value="14:00">14:00</option>
      <option value="15:00">15:00</option>
      <option value="16:00">16:00</option>
      <option value="17:00">17:00</option>
      <option value="18:00">18:00</option>
      <option value="19:00">19:00</option>
      <option value="20:00">20:00</option>
    </select>
  </div>
  <span id="status"></span>
</div>

<div id="table-container">
  <div id="message"></div>
</div>

<script>
  const COURSE_ORDER = ["Hoge Dijk", "Spaarnwoude", "Wilnis"];
  const COURSE_COLORS = {
    "Hoge Dijk":   { main: "#1a6b3c", sub: "#2a8a50" },
    "Spaarnwoude": { main: "#1a3a6b", sub: "#2a4f8a" },
    "Wilnis":      { main: "#6b3a1a", sub: "#8a4f2a" },
  };

  function todayStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  const dateInput = document.getElementById('date-input');
  dateInput.value = todayStr();

  let players = 2;
  let holes = 'all';
  let fromTime = '10:00';
  let includePar3 = false;
  let includeChampionship = true;

  const fromTimeSelect = document.getElementById('from-time');
  fromTimeSelect.addEventListener('change', () => { fromTime = fromTimeSelect.value; fetchData(); });

  const includePar3Checkbox = document.getElementById('include-par3');
  includePar3Checkbox.addEventListener('change', () => { includePar3 = includePar3Checkbox.checked; fetchData(); });

  const includeChampionshipCheckbox = document.getElementById('include-championship');
  includeChampionshipCheckbox.addEventListener('change', () => { includeChampionship = includeChampionshipCheckbox.checked; fetchData(); });

  function setupToggle(groupId, onChange) {
    const group = document.getElementById(groupId);
    group.addEventListener('click', e => {
      const btn = e.target.closest('.toggle-btn');
      if (!btn) return;
      group.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onChange(btn.dataset.value);
    });
  }

  setupToggle('players-group', v => { players = v; fetchData(); });
  setupToggle('holes-group',   v => { holes   = v; fetchData(); });
  dateInput.addEventListener('change', fetchData);

  async function fetchData() {
    const status = document.getElementById('status');
    const container = document.getElementById('table-container');
    const message = document.getElementById('message');

    status.textContent = 'Refreshing...';

    const params = new URLSearchParams({
      date: dateInput.value,
      players: players,
      holes: holes,
      include_par3: includePar3,
      include_championship: includeChampionship,
    });

    let data;
    try {
      const res = await fetch(`/api/tee-times?${params}`);
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      data = await res.json();
    } catch (err) {
      status.textContent = '';
      message.style.display = 'flex';
      message.className = 'error';
      message.textContent = `Failed to load tee times: ${err.message}`;
      const oldTable = container.querySelector('table');
      if (oldTable) oldTable.remove();
      return;
    }

    status.textContent = '';

    if (data.length === 0) {
      message.style.display = 'flex';
      message.className = '';
      message.textContent = 'No tee times found for these filters.';
      const oldTable = container.querySelector('table');
      if (oldTable) oldTable.remove();
      return;
    }

    message.style.display = 'none';

    renderTable(data, container);
  }

  function renderTable(data, container) {
    // Collect unique (course, sub_course) columns
    const colMap = new Map(); // key -> { course, sub_course, holes }
    const courseSubHoles = new Map(); // "course|sub" -> holes value (may vary — store all)

    for (const row of data) {
      const key = `${row.course}|||${row.sub_course}`;
      if (!colMap.has(key)) {
        colMap.set(key, { course: row.course, sub_course: row.sub_course, holes: row.holes });
      }
    }

    // Sort columns: by COURSE_ORDER, then alpha sub_course
    const cols = Array.from(colMap.values()).sort((a, b) => {
      const oa = COURSE_ORDER.indexOf(a.course);
      const ob = COURSE_ORDER.indexOf(b.course);
      if (oa !== ob) return (oa === -1 ? 999 : oa) - (ob === -1 ? 999 : ob);
      return a.sub_course.localeCompare(b.sub_course);
    });

    // Collect unique times at or after fromTime (sorted)
    const timeSet = new Set(data.filter(r => r.time >= fromTime).map(r => r.time));
    const times = Array.from(timeSet).sort();

    // Build lookup: "course|||sub_course|||time" -> row
    const lookup = new Map();
    for (const row of data) {
      const key = `${row.course}|||${row.sub_course}|||${row.time}`;
      lookup.set(key, row);
    }

    // Group columns by course for header
    const courseGroups = [];
    let i = 0;
    while (i < cols.length) {
      const course = cols[i].course;
      let j = i;
      while (j < cols.length && cols[j].course === course) j++;
      courseGroups.push({ course, start: i, count: j - i });
      i = j;
    }

    // Build table
    const table = document.createElement('table');

    // THEAD
    const thead = document.createElement('thead');

    // Row 1: course headers
    const tr1 = document.createElement('tr');
    // Time cell (rowspan=2)
    const thTime = document.createElement('th');
    thTime.rowSpan = 2;
    thTime.textContent = 'Time';
    thTime.className = 'th-time';
    tr1.appendChild(thTime);

    for (const grp of courseGroups) {
      const th = document.createElement('th');
      th.colSpan = grp.count;
      th.textContent = grp.course;
      th.className = 'th-course';
      const colors = COURSE_COLORS[grp.course] || { main: '#444', sub: '#666' };
      th.style.background = colors.main;
      tr1.appendChild(th);
    }
    thead.appendChild(tr1);

    // Row 2: sub-course headers
    const tr2 = document.createElement('tr');
    for (const col of cols) {
      const th = document.createElement('th');
      const shortName = col.sub_course.replace(/baan$/i, '');
      th.textContent = `${shortName} ${col.holes}`;
      th.className = 'th-sub';
      const colors = COURSE_COLORS[col.course] || { main: '#444', sub: '#666' };
      th.style.background = colors.sub;
      tr2.appendChild(th);
    }
    thead.appendChild(tr2);
    table.appendChild(thead);

    // TBODY
    const tbody = document.createElement('tbody');
    for (const time of times) {
      const tr = document.createElement('tr');

      const tdTime = document.createElement('td');
      tdTime.textContent = time;
      tdTime.className = 'td-time';
      tr.appendChild(tdTime);

      for (const col of cols) {
        const key = `${col.course}|||${col.sub_course}|||${time}`;
        const slot = lookup.get(key);
        const td = document.createElement('td');

        if (slot) {
          td.className = 'td-slot';
          td.style.background = slot.free_slots >= 4 ? '#2d7a3a' : slot.free_slots >= 2 ? '#5a9e65' : '#c8990a';
          td.setAttribute('role', 'button');
          td.tabIndex = 0;
          td.addEventListener('click', () => window.open(slot.booking_url, '_blank'));
          td.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') window.open(slot.booking_url, '_blank'); });

          const availSpan = document.createElement('span');
          availSpan.className = 'slot-avail';
          availSpan.textContent = `${slot.free_slots}/${slot.total_slots}`;
          td.appendChild(availSpan);

          if (slot.price_eur !== null && slot.price_eur !== undefined) {
            const priceSpan = document.createElement('span');
            priceSpan.className = 'slot-price';
            priceSpan.textContent = `€${Math.round(slot.price_eur)}`;
            td.appendChild(priceSpan);
          }
        } else {
          td.className = 'td-empty';
        }

        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }
    table.appendChild(tbody);

    const oldTable = container.querySelector('table');
    if (oldTable) oldTable.remove();
    container.appendChild(table);
  }

  fetchData();
</script>
</body>
</html>
